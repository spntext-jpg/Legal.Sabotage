<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Офисная Экономия 2026 • Калининград</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">

<style>

:root {
    --bg-gradient: linear-gradient(135deg,#f3f7f0 0%,#fbf5ee 100%);
    --surface: rgba(255,255,255,.85);

    --lime-neon:#d4f57a;
    --lime-pastel:#eafbc0;

    --orange-neon:#ff9f43;
    --orange-pastel:#ffdcb8;

    --text-main:#2d3436;
    --text-muted:#636e72;

    --glow-lime:rgba(212,245,122,.6);
    --glow-orange:rgba(255,159,67,.4);

    --radius-m3:28px;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Plus Jakarta Sans',sans-serif;
    background:var(--bg-gradient);
    color:var(--text-main);

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;
}

.calculator-card{
    background:var(--surface);

    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.6);

    width:100%;
    max-width:950px;

    border-radius:var(--radius-m3);

    padding:40px;

    box-shadow:0 20px 40px rgba(0,0,0,.03);

    display:grid;
    grid-template-columns:1fr 1fr;
    gap:40px;
}

@media(max-width:768px){
    .calculator-card{
        grid-template-columns:1fr;
        padding:25px;
        gap:25px;
    }
}

h1{
    grid-column:1 / -1;

    font-family:'Orbitron',sans-serif;
    font-size:1.6rem;
    font-weight:800;

    text-transform:uppercase;

    background:linear-gradient(90deg,#ff9f43,#b8e91c);

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    margin-bottom:10px;
}

.input-section{
    display:flex;
    flex-direction:column;
    gap:25px;
}

.control-group{
    display:flex;
    flex-direction:column;
    gap:10px;
}

label{
    font-size:.85rem;
    font-weight:700;
    color:var(--text-muted);
    text-transform:uppercase;
}

.slider-container{
    display:flex;
    align-items:center;
    gap:15px;
}

input[type=range]{
    width:100%;
    height:12px;

    appearance:none;
    -webkit-appearance:none;

    border-radius:8px;
    background:#e4e9ed;
}

input[type=range]::-webkit-slider-thumb{
    appearance:none;
    -webkit-appearance:none;

    width:24px;
    height:24px;

    border-radius:50%;

    background:var(--text-main);
    border:4px solid var(--lime-neon);

    cursor:pointer;
}

input[type=range]::-webkit-slider-thumb:hover{
    transform:scale(1.15);
    box-shadow:0 0 15px var(--glow-lime);
}

.counter-value{
    min-width:50px;

    text-align:right;

    font-family:'Orbitron',sans-serif;
    font-size:1.1rem;
}

.results-section{
    background:rgba(255,255,255,.55);

    border-radius:20px;

    padding:30px;

    border:1px solid rgba(255,255,255,.4);

    display:flex;
    flex-direction:column;
    gap:20px;
}

.result-block{
    display:flex;
    flex-direction:column;
    gap:5px;
}

.result-title{
    font-size:.85rem;
    color:var(--text-muted);
    text-transform:uppercase;
    font-weight:700;
}

.result-number{
    font-family:'Orbitron',sans-serif;
    font-size:2rem;
    font-weight:800;
}

.highlight-lime{
    color:#8cb800;
}

.highlight-orange{
    color:#e67e22;
}

.massage-info{
    margin-top:10px;

    background:var(--lime-pastel);

    padding:15px;

    border-radius:16px;

    border-left:5px solid var(--orange-neon);

    line-height:1.5;
}

</style>
</head>

<body>

<div class="calculator-card">

    <h1>Офисная Экономия 2026 • Калининград</h1>

    <div class="input-section">

<div class="control-group">
    <label for="officeDays">Дней в офисе в неделю</label>

    <div class="slider-container">
        <input type="range" id="officeDays" min="0" max="5" value="4">
        <span class="counter-value" id="officeDaysVal">4</span>
    </div>
</div>

        <div class="control-group">
            <label for="coffeeCut">Отказ от кофе и кейк-попсов в неделю</label>

            <div class="slider-container">
                <input type="range" id="coffeeCut" min="0" max="4" value="2">
                <span class="counter-value" id="coffeeCutVal">2</span>
            </div>
        </div>

        <div class="control-group">
            <label for="remoteDays">Дней удалёнки в неделю</label>

            <div class="slider-container">
                <input type="range" id="remoteDays" min="0" max="5" value="1">
                <span class="counter-value" id="remoteDaysVal">1</span>
            </div>
        </div>

    </div>

    <div class="results-section">

        <div class="result-block">
            <span class="result-title">Годовая экономия на вкусняшках</span>
            <span class="result-number highlight-lime" id="foodSavings">0 ₽</span>
        </div>

        <div class="result-block">
            <span class="result-title">Годовая экономия на удалёнке</span>
            <span class="result-number highlight-orange" id="remoteSavings">0 ₽</span>
        </div>

        <div class="result-block">
            <span class="result-title">Общий годовой бюджет</span>
            <span class="result-number" id="totalBudget">0 ₽</span>
        </div>

        <div class="massage-info">
            💆‍♂️ На эти деньги каждый сотрудник сможет получить в среднем
            <strong id="massagePerPerson">0</strong>
            сеансов массажа спины в год.
        </div>

    </div>

</div>

<script>

document.addEventListener('DOMContentLoaded', () => {

    const COST_COFFEE_POPS = 420;
    const WEEKS_IN_YEAR = 52;

    const ECO_ELECTRICITY = 10.12;
    const ECO_WATER = 2.55;
    const ECO_SUPPLIES = 20.0;
    const ECO_OFFICE_WATER = 23.3;
    const ECO_CLEANING_TRASH = 24.0;
    const ECO_TRANSPORT = 76.0;

    const MASSAGE_SESSION_COST = 2000;

    const teamSizeInput = document.getElementById('teamSize');
    const coffeeCutInput = document.getElementById('coffeeCut');
    const officeDaysInput = document.getElementById('officeDays');

    const teamSizeVal = document.getElementById('teamSizeVal');
    const coffeeCutVal = document.getElementById('coffeeCutVal');
    const officeDaysVal = document.getElementById('officeDaysVal');

    const foodSavingsEl = document.getElementById('foodSavings');
    const remoteSavingsEl = document.getElementById('remoteSavings');
    const totalBudgetEl = document.getElementById('totalBudget');
    const massagePerPersonEl = document.getElementById('massagePerPerson');

    function calculateEconomy() {

        const teamSize = Number(teamSizeInput.value);
        const coffeeCut = Number(coffeeCutInput.value);
        const officeDays = Number(officeDaysInput.value);
        const remoteDays = 5 - officeDays;

        teamSizeVal.textContent = teamSize;
        coffeeCutVal.textContent = coffeeCut;
        officeDaysVal.textContent = officeDays;

        const annualFoodSavings =
            teamSize *
            coffeeCut *
            COST_COFFEE_POPS *
            WEEKS_IN_YEAR;

        const totalEcoPerPersonPerDay =
            ECO_ELECTRICITY +
            ECO_WATER +
            ECO_SUPPLIES +
            ECO_OFFICE_WATER +
            ECO_CLEANING_TRASH +
            ECO_TRANSPORT;

        const annualRemoteSavings =
            teamSize *
            remoteDays *
            totalEcoPerPersonPerDay *
            WEEKS_IN_YEAR;

        const totalBudget =
            annualFoodSavings +
            annualRemoteSavings;

        const totalMassages =
            Math.floor(totalBudget / MASSAGE_SESSION_COST);

        const massagesPerPerson =
    teamSize > 0
        ? Math.floor(totalMassages / teamSize)
        : 0;

        foodSavingsEl.textContent =
            annualFoodSavings.toLocaleString('ru-RU') + ' ₽';

        remoteSavingsEl.textContent =
            Math.round(annualRemoteSavings).toLocaleString('ru-RU') + ' ₽';

        totalBudgetEl.textContent =
            Math.round(totalBudget).toLocaleString('ru-RU') + ' ₽';

        massagePerPersonEl.textContent =
            massagesPerPerson;
    }

    teamSizeInput.addEventListener('input', calculateEconomy);
    coffeeCutInput.addEventListener('input', calculateEconomy);
    officeDaysInput.addEventListener('input', calculateEconomy);

    calculateEconomy();

});

</script>

</body>
